<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning · Course Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        :root {
            --crimson: #a51c30;
            --stark-gold: #d4af37;
            --stark-cyan: #00e5ff;
            --dark-glass: rgba(20, 20, 20, 0.85);
        }

        /* ========= TOP BAR ========= */
        .top-bar {
            background: #0d0d0d;
            border-bottom: 1px solid rgba(165, 28, 48, 0.4);
            padding: 0.85rem 2rem;
            display: flex;
            gap: 1.8rem;
            align-items: baseline;
            flex-wrap: wrap;
            flex-shrink: 0;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .top-bar a {
            text-decoration: none;
            color: #b0b0b0;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s, text-shadow 0.2s;
        }

        .top-bar a:hover {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(165, 28, 48, 0.5);
        }

        .topic-title {
            margin-left: auto;
            font-weight: 600;
            color: #ffffff;
            background: #a51c30;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .menu-toggle {
            display: none;
            background: #a51c30;
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .menu-toggle:hover {
            background: #b14142;
        }

        /* ========= MAIN LAYOUT ========= */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ========= SIDEBAR ========= */
        .sidebar {
            width: 320px;
            background: rgba(18, 16, 16, 0.95);
            border-right: 1px solid rgba(165, 28, 48, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.5);
        }

        .sidebar-header {
            padding: 1.2rem 1.2rem 0.8rem;
            font-weight: 700;
            font-size: 1rem;
            color: #d4af37;
            border-bottom: 1px solid rgba(165, 28, 48, 0.3);
            background: rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .lesson-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0.5rem 0;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.9rem 1.2rem;
            margin: 0.2rem 0.6rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .lesson-item:hover {
            background: rgba(165, 28, 48, 0.1);
            border-color: rgba(165, 28, 48, 0.2);
        }

        .lesson-item.active {
            background: rgba(165, 28, 48, 0.2);
            border-left: 4px solid #a51c30;
            box-shadow: 0 0 10px rgba(165, 28, 48, 0.3);
        }

        .lesson-check {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #555;
            background: transparent;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.1s;
        }

        .lesson-check.completed {
            background: #a51c30;
            border-color: #a51c30;
            box-shadow: 0 0 8px rgba(165, 28, 48, 0.5);
        }

        .lesson-check.completed::after {
            content: "✓";
            color: white;
            font-size: 13px;
            font-weight: bold;
        }

        .lesson-title {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.3;
            color: #ddd;
        }

        .lesson-duration {
            font-size: 0.7rem;
            color: #888;
        }

        /* ========= CONTENT AREA ========= */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1.8rem 2.2rem;
            gap: 1.8rem;
            background: linear-gradient(180deg, #0d0a0a 0%, #0a0a0a 100%);
        }

        /* Video container */
        .video-container {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(165, 28, 48, 0.3);
            transition: all 0.2s;
            width: 100%;
            min-height: 680px;
            max-height: 65vh;
            position: relative;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Navigation buttons */
        .lesson-nav {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #a51c30;
            color: white;
            padding: 0.6rem 1.6rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .nav-btn:hover:not(:disabled) {
            background: #a51c30;
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(165, 28, 48, 0.5);
        }

        .nav-btn:disabled {
            border-color: #3a3a3a;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* PDF lecture viewer – replaces notes */
        .pdf-lecture-section {
            background: rgba(20, 20, 20, 0.7);
            border-radius: 24px;
            border: 1px solid rgba(165, 28, 48, 0.3);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            flex: 1;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .pdf-header {
            padding: 0.9rem 1.2rem;
            background: rgba(0, 0, 0, 0.4);
            font-weight: 700;
            border-bottom: 1px solid rgba(165, 28, 48, 0.3);
            font-size: 0.9rem;
            color: #d4af37;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        embed {
            width: 100%;
            flex: 1;
            border: none;
            display: block;
            background: #000;
        }

        /* scrollbar styling */
        .lesson-list::-webkit-scrollbar,
        .content-area::-webkit-scrollbar {
            width: 5px;
        }

        .lesson-list::-webkit-scrollbar-track,
        .content-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .lesson-list::-webkit-scrollbar-thumb,
        .content-area::-webkit-scrollbar-thumb {
            background: #3a1a1a;
            border-radius: 10px;
        }

        /* responsive */
        @media (max-width: 800px) {
            .sidebar {
                position: fixed;
                left: -320px;
                top: 70px;
                bottom: 0;
                z-index: 100;
                transition: left 0.25s ease;
                box-shadow: 4px 0 20px rgba(0, 0, 0, 0.6);
                border-radius: 0 20px 0 0;
            }

            .sidebar.open {
                left: 0;
            }

            .menu-toggle {
                display: inline-block;
            }

            .top-bar {
                padding: 0.75rem 1rem;
            }

            .topic-title {
                font-size: 0.7rem;
            }

            .content-area {
                padding: 1rem;
            }

            .video-container {
                min-height: 240px;
            }
        }
    </style>
</head>
<body>
<div class="top-bar">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>
    <a href="index.html">🏠 Home</a>
    <a href="library.html">📖 Library</a>
    <a href="#" id="backToHubLink" style="margin-left:auto;">← Back to subject hub</a>
    <span class="topic-title" id="topicTitleSpan">Loading...</span>
</div>

<div class="main-layout">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">📚 Course lessons</div>
        <ul class="lesson-list" id="lessonList"></ul>
    </div>

    <div class="content-area" id="contentArea">
        <div class="video-container">
            <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        </div>
        <div class="lesson-nav">
            <button class="nav-btn" id="prevLessonBtn" disabled>← Previous lesson</button>
            <button class="nav-btn" id="nextLessonBtn" disabled>Next lesson →</button>
        </div>

        <!-- PDF lecture viewer (replaces notes) -->
        <div class="pdf-lecture-section" id="pdfSection">
            <div class="pdf-header">📄 Lecture slides / PDF</div>
            <embed id="pdfEmbed" src="" type="application/pdf">
            <div id="pdfFallback" style="display:none; padding:2rem; text-align:center; color:#b84748;">
                ⚠️ PDF not found or cannot be displayed. Please check the file path in data.json.
            </div>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const subjectKey = urlParams.get('subject');
    const topicKey = urlParams.get('topic');

    let currentData = null;
    let currentSubject = null;
    let currentTopic = null;
    let lessons = [];
    let currentLessonIndex = 0;

    // DOM elements
    const videoPlayer = document.getElementById('videoPlayer');
    const lessonListEl = document.getElementById('lessonList');
    const prevBtn = document.getElementById('prevLessonBtn');
    const nextBtn = document.getElementById('nextLessonBtn');
    const pdfEmbed = document.getElementById('pdfEmbed');
    const pdfFallback = document.getElementById('pdfFallback');
    const backToHubLink = document.getElementById('backToHubLink');
    const topicTitleSpan = document.getElementById('topicTitleSpan');
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');

    // Mobile menu
    menuToggle?.addEventListener('click', () => {
        sidebar.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
        if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== menuToggle) {
            sidebar.classList.remove('open');
        }
    });

    if (!subjectKey || !topicKey) {
        document.getElementById('contentArea').innerHTML = '<div style="padding:2rem;">❌ Missing subject or topic. <a href="index.html" style="color:#00e5ff;">Go Home</a></div>';
    } else {
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                currentData = data;
                if (!data.subjects[subjectKey]) throw new Error(`Subject "${subjectKey}" not found`);
                currentSubject = data.subjects[subjectKey];
                if (!currentSubject.topics[topicKey]) throw new Error(`Topic "${topicKey}" not found`);
                currentTopic = currentSubject.topics[topicKey];
                lessons = currentTopic.lessons || [];
                if (lessons.length === 0) throw new Error('No lessons found for this topic');

                // Set PDF
                if (currentTopic.pdf) {
                    pdfEmbed.src = currentTopic.pdf;
                    pdfEmbed.style.display = 'block';
                    pdfFallback.style.display = 'none';
                } else {
                    pdfEmbed.style.display = 'none';
                    pdfFallback.style.display = 'block';
                }

                backToHubLink.href = `subject.html?subject=${subjectKey}`;
                topicTitleSpan.innerText = `${currentSubject.name} · ${currentTopic.title}`;
                document.title = `${currentSubject.name} – ${currentTopic.title}`;

                const savedLesson = localStorage.getItem(`${subjectKey}_${topicKey}_lastLesson`);
                currentLessonIndex = savedLesson ? parseInt(savedLesson) : 0;
                if (currentLessonIndex >= lessons.length) currentLessonIndex = 0;
                renderLessonList();
                loadLesson(currentLessonIndex);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('contentArea').innerHTML = `<div style="padding:2rem;">❌ Error: ${err.message}<br>Make sure data.json is valid.</div>`;
            });
    }

    function renderLessonList() {
        lessonListEl.innerHTML = '';
        lessons.forEach((lesson, idx) => {
            const li = document.createElement('li');
            li.className = 'lesson-item';
            if (idx === currentLessonIndex) li.classList.add('active');
            const checkSpan = document.createElement('span');
            checkSpan.className = 'lesson-check';
            const completedKey = `${subjectKey}_${topicKey}_lesson_${idx}_completed`;
            if (localStorage.getItem(completedKey) === 'true') checkSpan.classList.add('completed');
            const titleSpan = document.createElement('span');
            titleSpan.className = 'lesson-title';
            titleSpan.innerText = lesson.title;
            const durationSpan = document.createElement('span');
            durationSpan.className = 'lesson-duration';
            durationSpan.innerText = lesson.duration || '12 min';
            li.appendChild(checkSpan);
            li.appendChild(titleSpan);
            li.appendChild(durationSpan);
            li.addEventListener('click', (e) => {
                if (e.target === checkSpan) return;
                currentLessonIndex = idx;
                loadLesson(currentLessonIndex);
                renderLessonList();
                if (sidebar.classList.contains('open')) sidebar.classList.remove('open');
            });
            checkSpan.addEventListener('click', (e) => {
                e.stopPropagation();
                const newCompleted = localStorage.getItem(completedKey) !== 'true';
                localStorage.setItem(completedKey, newCompleted ? 'true' : 'false');
                renderLessonList();
            });
            lessonListEl.appendChild(li);
        });
        prevBtn.disabled = (currentLessonIndex === 0);
        nextBtn.disabled = (currentLessonIndex === lessons.length - 1);
    }

    function loadLesson(index) {
        const lesson = lessons[index];
        if (!lesson) return;
        videoPlayer.src = lesson.video;
        localStorage.setItem(`${subjectKey}_${topicKey}_lastLesson`, index);
        renderLessonList();
    }

    prevBtn.addEventListener('click', () => {
        if (currentLessonIndex > 0) {
            currentLessonIndex--;
            loadLesson(currentLessonIndex);
        }
    });
    nextBtn.addEventListener('click', () => {
        if (currentLessonIndex < lessons.length - 1) {
            currentLessonIndex++;
            loadLesson(currentLessonIndex);
        }
    });
</script>
</body>
</html>
