<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Hub – Constellation Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        :root {
            --crimson: #a51c30;
            --stark-gold: #d4af37;
            --stark-cyan: #00e5ff;
            --dark-card: rgba(20, 20, 20, 0.85);
        }

        /* ========= HERO – full column layout, tree inside ========= */
        .hero {
            position: relative;
            height: 55vh;
            min-height: 420px;
            background-size: cover;
            background-position: center 30%;
            display: flex;
            flex-direction: column;      /* <-- stack title and tree vertically */
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #1c0a0a;
            flex-shrink: 0;
            border-bottom: 2px solid rgba(165, 28, 48, 0.35);
            overflow: hidden;
            transition: background-image 0.5s ease;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(10, 2, 2, 0.92) 0%,
                    rgba(30, 5, 10, 0.78) 100%);
            z-index: 1;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(45deg,
                    rgba(0, 229, 255, 0.025) 0px,
                    rgba(0, 229, 255, 0.025) 2px,
                    transparent 2px,
                    transparent 8px);
            z-index: 1;
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1100px;
            padding: 0.8rem 1.5rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            flex-shrink: 0;            /* title block doesn't grow */
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 14px rgba(165, 28, 48, 0.5);
            line-height: 1.2;
        }

        .hero-content p {
            font-size: 0.9rem;
            color: #c5c5c5;
            letter-spacing: 0.4px;
        }

        .accent-line {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #a51c30, #00e5ff);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(165, 28, 48, 0.4);
        }

        /* Tree container – fills remaining hero space */
        .tree-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            flex: 1 1 auto;            /* take remaining height */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;             /* allow flex shrink */
            padding: 0.3rem 1rem 0.8rem;
        }

        .constellation-svg {
            width: 100%;
            height: 100%;
            max-width: 750px;
            overflow: visible;
        }

        .constellation-svg .star-node {
            transition: filter 0.3s;
            cursor: default;
        }

        .constellation-svg .star-node:hover {
            filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.8));
        }

        .back-link {
            position: absolute;
            top: 1rem;
            left: 1.5rem;
            z-index: 5;
            color: #fff;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.55);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.4px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.2s;
        }

        .back-link:hover {
            background: #a51c30;
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(165, 28, 48, 0.5);
        }

        /* ========= TOPICS SECTION ========= */
        .topics-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.8rem 1.5rem;
            background: linear-gradient(180deg, #110a0a 0%, #0a0a0a 100%);
        }

        .topics-container::-webkit-scrollbar {
            width: 5px;
        }

        .topics-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .topics-container::-webkit-scrollbar-thumb {
            background: #3a1a1a;
            border-radius: 10px;
        }

        .topics-grid {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .topic-card {
            background: rgba(22, 16, 16, 0.8);
            border-radius: 14px;
            padding: 1.2rem 1rem;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-decoration: none;
            color: inherit;
            display: block;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .topic-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: #a51c30;
            border-radius: 0 3px 3px 0;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .topic-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 28px -8px rgba(165, 28, 48, 0.3);
            border-color: rgba(165, 28, 48, 0.4);
            background: rgba(30, 18, 18, 0.9);
        }

        .topic-card:hover::before {
            opacity: 1;
        }

        .topic-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.3rem;
            letter-spacing: -0.2px;
        }

        .topic-desc {
            font-size: 0.75rem;
            color: #999;
            line-height: 1.4;
        }

        .topic-meta {
            margin-top: 0.7rem;
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .error-message {
            text-align: center;
            padding: 2rem;
            color: #b84748;
            font-size: 0.9rem;
        }

        .error-message a {
            color: #00e5ff;
            text-decoration: underline;
        }

        @media (max-width: 700px) {
            .hero {
                height: 50vh;
                min-height: 360px;
            }
            .hero-content h1 {
                font-size: 1.6rem;
            }
            .topics-container {
                padding: 0.8rem 1rem;
            }
            .topics-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 0.7rem;
            }
            .topic-card {
                padding: 1rem 0.8rem;
            }
        }

        @media (max-width: 500px) {
            .hero {
                height: 45vh;
                min-height: 320px;
            }
            .tree-wrapper {
                overflow-x: auto;
            }
            .constellation-svg {
                min-width: 420px;
            }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← All subjects</a>

    <div class="hero" id="heroSection">
        <!-- Title block (shrink‑to‑fit) -->
        <div class="hero-content">
            <h1 id="subjectName">Loading…</h1>
            <p id="heroSubtitle">Constellation of knowledge</p>
            <div class="accent-line"></div>
        </div>

        <!-- Skill tree fills remaining hero height -->
        <div class="tree-wrapper" id="treeWrapper">
            <!-- SVG injected here -->
        </div>
    </div>

    <div class="topics-container">
        <div class="topics-grid" id="topicsGrid">
            <div class="error-message">Loading topics…</div>
        </div>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const subjectKey = urlParams.get('subject');

            const heroSection = document.getElementById('heroSection');
            const subjectNameEl = document.getElementById('subjectName');
            const heroSubtitle = document.getElementById('heroSubtitle');
            const treeWrapper = document.getElementById('treeWrapper');
            const topicsGrid = document.getElementById('topicsGrid');

            // Helpers
            function getSubjectEmoji(key) {
                const map = {
                    physics: '⚛️',
                    chemistry: '🧪',
                    mathematics: '📐',
                    coding: '💻',
                    english: '📖',
                    law: '⚖️',
                    economy: '📊',
                    accounting: '📑'
                };
                return map[key] || '📘';
            }

            function getTopicEmoji(topicKey) {
                const map = {
                    mechanics: '🔧',
                    electromagnetism: '⚡',
                    organic: '🌿',
                    inorganic: '🧱',
                    calculus: '∫',
                    algebra: '𝑥',
                    algorithms: '🔍',
                    web: '🌐',
                    literature: '📚',
                    writing: '✍️',
                    contracts: '📜',
                    torts: '⚖️',
                    micro: '🔬',
                    macro: '🌍',
                    basics: '📋'
                };
                return map[topicKey] || '•';
            }

            // ---------- Constellation tree (detailed, label-friendly) ----------
            function buildDetailedTree(subjectData, subKey) {
                if (!subjectData || !subjectData.topics || Object.keys(subjectData.topics).length === 0) {
                    return `<svg class="constellation-svg" viewBox="0 0 500 180">
                        <text x="250" y="90" text-anchor="middle" fill="#888" font-size="0.85rem" font-family="Inter">No topics yet</text>
                    </svg>`;
                }

                const topicEntries = Object.entries(subjectData.topics);
                const maxVisibleLessons = 7;
                const starR = 8;
                const glowR = 15;
                const topicR = 10;
                const rootR = 11;

                const rootX = 40;
                const topicX = 170;
                const lessonStartX = 310;
                const lessonSpacingX = 58;
                const lessonSpacingY = 28;

                let totalHeight = 0;
                const topicLayouts = [];

                topicEntries.forEach(([tKey, topic]) => {
                    const lessonCount = topic.lessons ? topic.lessons.length : 0;
                    const visible = Math.min(lessonCount, maxVisibleLessons);
                    const extra = lessonCount > maxVisibleLessons ? 1 : 0;
                    const totalNodes = visible + extra;
                    const blockHeight = totalNodes * lessonSpacingY + 24;
                    topicLayouts.push({ key: tKey, topic, visible, extra, totalNodes, blockHeight });
                    totalHeight += blockHeight;
                });

                const gapBetweenTopics = 30;
                totalHeight += (topicLayouts.length - 1) * gapBetweenTopics;
                totalHeight = Math.max(totalHeight, 200);
                const paddingTop = 40, paddingBottom = 40;
                const svgHeight = totalHeight + paddingTop + paddingBottom;
                const rootY = svgHeight / 2;

                let lines = '', stars = '', labels = '';
                let currentY = paddingTop;

                topicLayouts.forEach((layout) => {
                    const { topic, visible, extra, totalNodes, blockHeight } = layout;
                    const topicCenterY = currentY + blockHeight / 2;
                    const firstStarY = topicCenterY - ((totalNodes - 1) * lessonSpacingY) / 2;

                    // Root → topic line
                    lines += `<line x1="${rootX + rootR}" y1="${rootY}" x2="${topicX - topicR}" y2="${topicCenterY}" stroke="rgba(0,229,255,0.28)" stroke-width="1.2" />`;

                    // Topic circle
                    stars += `<circle cx="${topicX}" cy="${topicCenterY}" r="${glowR}" fill="rgba(212,175,55,0.08)" />
                              <circle cx="${topicX}" cy="${topicCenterY}" r="${topicR}" fill="#1c1c1c" stroke="#d4af37" stroke-width="1.8" class="star-node" />`;

                    // Topic label
                    labels += `<text x="${topicX}" y="${topicCenterY - topicR - 10}" text-anchor="middle" fill="#d4af37" font-size="0.7rem" font-weight="600" font-family="Inter" letter-spacing="0.5">${topic.title}</text>`;

                    // Lessons
                    for (let i = 0; i < visible; i++) {
                        const lesson = topic.lessons[i];
                        const starY = firstStarY + i * lessonSpacingY;
                        const starX = lessonStartX + i * lessonSpacingX;

                        lines += `<line x1="${topicX + topicR}" y1="${topicCenterY}" x2="${starX - starR}" y2="${starY}" stroke="rgba(0,229,255,0.2)" stroke-width="0.9" />`;

                        stars += `<circle cx="${starX}" cy="${starY}" r="${glowR}" fill="rgba(0,229,255,0.09)" />
                                  <circle cx="${starX}" cy="${starY}" r="${starR}" fill="#151515" stroke="#00e5ff" stroke-width="1.3" class="star-node" />`;

                        const labelY = (i % 2 === 0) ? starY - starR - 9 : starY + starR + 13;
                        labels += `<text x="${starX}" y="${labelY}" text-anchor="middle" fill="#bbb" font-size="0.58rem" font-family="Inter">${lesson.title}</text>`;
                    }

                    // Extra +X node
                    if (extra) {
                        const extraIdx = visible;
                        const starY = firstStarY + extraIdx * lessonSpacingY;
                        const starX = lessonStartX + extraIdx * lessonSpacingX;
                        const remaining = (topic.lessons ? topic.lessons.length : 0) - visible;

                        lines += `<line x1="${topicX + topicR}" y1="${topicCenterY}" x2="${starX - starR}" y2="${starY}" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" stroke-dasharray="4 3" />`;

                        stars += `<circle cx="${starX}" cy="${starY}" r="${glowR}" fill="rgba(255,255,255,0.04)" />
                                  <circle cx="${starX}" cy="${starY}" r="${starR}" fill="none" stroke="#777" stroke-width="1.2" stroke-dasharray="3 2" />`;

                        labels += `<text x="${starX}" y="${starY + starR + 13}" text-anchor="middle" fill="#777" font-size="0.55rem">+${remaining} more</text>`;
                    }

                    currentY += blockHeight + gapBetweenTopics;
                });

                // Root star
                const rootStar = `<circle cx="${rootX}" cy="${rootY}" r="${glowR + 4}" fill="rgba(165,28,48,0.22)" />
                                  <circle cx="${rootX}" cy="${rootY}" r="${rootR}" fill="#a51c30" stroke="#d4af37" stroke-width="2.2" class="star-node" />
                                  <text x="${rootX + rootR + 12}" y="${rootY + 5}" text-anchor="start" fill="#ffffff" font-size="0.8rem" font-weight="700" font-family="Playfair Display, serif">${getSubjectEmoji(subKey)} ${subjectData.name}</text>`;

                return `<svg class="constellation-svg" viewBox="0 0 520 ${svgHeight}" preserveAspectRatio="xMidYMid meet">
                    <rect width="100%" height="100%" fill="transparent" />
                    ${lines}
                    ${stars}
                    ${labels}
                    ${rootStar}
                </svg>`;
            }

            function showLoadingTree() {
                treeWrapper.innerHTML = `<svg class="constellation-svg" viewBox="0 0 500 200">
                    <text x="250" y="100" text-anchor="middle" fill="#666" font-size="0.85rem" font-family="Inter">Loading constellation…</text>
                </svg>`;
            }

            function showErrorTree(msg) {
                treeWrapper.innerHTML = `<svg class="constellation-svg" viewBox="0 0 500 160">
                    <text x="250" y="80" text-anchor="middle" fill="#b84748" font-size="0.8rem" font-family="Inter">${msg}</text>
                </svg>`;
            }

            // ---------- Initialise ----------
            if (!subjectKey) {
                topicsGrid.innerHTML = '<div class="error-message">❌ No subject specified. Go back to <a href="index.html">Home</a>.</div>';
                subjectNameEl.innerText = 'Error';
                showErrorTree('No subject in URL');
            } else {
                showLoadingTree();

                fetch('data.json')
                    .then(response => {
                        if (!response.ok) throw new Error('Network response was not ok');
                        return response.json();
                    })
                    .then(data => {
                        const subject = data.subjects[subjectKey];
                        if (!subject) {
                            topicsGrid.innerHTML = `<div class="error-message">❌ Subject "${subjectKey}" not found in curriculum.</div>`;
                            subjectNameEl.innerText = 'Not Found';
                            showErrorTree('Subject not found');
                            return;
                        }

                        // Apply hero background & name
                        heroSection.style.backgroundImage = `url('${subject.hero}')`;
                        subjectNameEl.innerText = subject.name;
                        heroSubtitle.innerText = 'Explore the constellation below';

                        // Render tree
                        treeWrapper.innerHTML = buildDetailedTree(subject, subjectKey);

                        // Build topic cards
                        const topics = subject.topics;
                        topicsGrid.innerHTML = '';

                        if (Object.keys(topics).length === 0) {
                            topicsGrid.innerHTML = '<div class="error-message">No topics added yet. Check back later.</div>';
                            return;
                        }

                        for (const [topicKey, topic] of Object.entries(topics)) {
                            const card = document.createElement('a');
                            card.href = `learn.html?subject=${subjectKey}&topic=${topicKey}`;
                            card.className = 'topic-card';
                            const lessonCount = topic.lessons ? topic.lessons.length : 0;
                            card.innerHTML = `
                                <div class="topic-title">${getTopicEmoji(topicKey)} ${topic.title}</div>
                                <div class="topic-desc">${topic.description || 'Master this topic.'}</div>
                                <div class="topic-meta">${lessonCount} lesson${lessonCount !== 1 ? 's' : ''}</div>
                            `;
                            topicsGrid.appendChild(card);
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        topicsGrid.innerHTML = '<div class="error-message">❌ Failed to load data.json. Make sure the file exists.</div>';
                        subjectNameEl.innerText = 'Error';
                        showErrorTree('Data load failed');
                    });
            }
        })();
    </script>
</body>
</html>
